<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>FilmSync Watch Party</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(31, 40, 51, 0.45);
      --primary: #45f3ff;
      --secondary: #66fcf1;
      --text: #c5c6c7;
      --text-bright: #ffffff;
      --accent: #ff4757;
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: var(--font);
      background-color: var(--bg-color);
      color: var(--text);
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-bright);
      text-align: center;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    h1 span {
      color: var(--primary);
    }

    .subtitle {
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 20px;
      color: #888;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--secondary);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: var(--text-bright);
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 8px rgba(69, 243, 255, 0.2);
    }

    /* Switch Tasarımları */
    .switch-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
    }
    .switch-label {
      font-size: 0.8rem;
      color: var(--text-bright);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #0b0c10;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 252, 241, 0.4);
    }

    .btn-action {
      background: linear-gradient(135deg, #2ed573, #7bed9f);
      color: #0b0c10;
      margin-top: 10px;
    }

    .btn-action:hover {
      box-shadow: 0 4px 15px rgba(46, 213, 115, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-bright);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-danger {
      background: var(--accent);
      color: white;
      margin-top: 10px;
    }

    .btn-danger:hover {
      box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
    }

    .active-room-card {
      background: rgba(69, 243, 255, 0.05);
      border: 1px dashed var(--primary);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: center;
    }

    .room-id-display {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--primary);
      margin: 8px 0;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .room-id-display:active {
      transform: scale(0.98);
    }

    .copied-toast {
      font-size: 0.7rem;
      color: var(--secondary);
      margin-top: 4px;
      display: none;
    }

    /* Ayarlar Paneli */
    .settings-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
    }
    .settings-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .user-list-container {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
    }
    .user-list-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .user-list-items {
      font-size: 0.8rem;
      color: var(--text);
      max-height: 80px;
      overflow-y: auto;
      padding-left: 5px;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .user-online-dot {
      width: 6px;
      height: 6px;
      background-color: #2ed573;
      border-radius: 50%;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent);
    }

    .status-dot.active {
      background-color: #2ed573;
      box-shadow: 0 0 8px #2ed573;
    }

    .hidden {
      display: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="libs/firebase-app.js"></script>
  <script src="libs/firebase-database.js"></script>
</head>
<body>
  <div class="container">
    <h1>FilmSync <span>Party</span> 🍿</h1>
    <div class="subtitle">Arkadaşlarınla Birlikte İzle</div>

    <!-- Aktif Bağlantı Detayı -->
    <div id="activeRoomContainer" class="active-room-card hidden">
      <div>Şu an bağlı olduğunuz oda:</div>
      <div id="roomIdDisplay" class="room-id-display" title="Kopyalamak için tıklayın">-----</div>
      <div class="copied-toast" id="copiedToast">Oda adı kopyalandı!</div>
      
      <button id="btnGoToMovie" class="btn-action hidden">Film Sayfasına Git 🎬</button>

      <!-- Premium Gelişmiş Ayarlar -->
      <div class="settings-panel">
        <div class="settings-title">Gelişmiş Ayarlar</div>
        
        <div class="switch-group">
          <span class="switch-label">Sadece Kurucu Kontrolü 🔒</span>
          <label class="switch">
            <input type="checkbox" id="hostLockSwitch">
            <span class="slider"></span>
          </label>
        </div>

        <div class="switch-group" style="flex-direction: column; align-items: flex-start; gap: 6px;">
          <span class="switch-label">Jeneriği Otomatik Atla (sn) ⏩</span>
          <input type="number" id="skipIntroInput" placeholder="Atlanacak saniye (Örn: 90)" style="width: 100px; padding: 6px;" min="0">
        </div>
      </div>

      <!-- Aktif Kullanıcı Listesi -->
      <div class="user-list-container">
        <div class="user-list-title" id="userCountTitle">Aktif Üyeler (0)</div>
        <div class="user-list-items" id="activeUsersList"></div>
      </div>

      <button id="btnRetrySync" class="btn-primary" style="margin-top: 12px;">Senkronizasyonu Yenile</button>
      <button id="btnCopyInvite" class="btn-secondary">Davet Linkini Kopyala</button>
      <button id="btnLeaveRoom" class="btn-danger">Odan Ayrıl</button>
    </div>

    <!-- Bağlantı Formu -->
    <div id="joinFormContainer">
      <div class="form-group">
        <label for="usernameInput">Adınız</label>
        <input type="text" id="usernameInput" placeholder="Kullanıcı adınızı girin">
      </div>

      <div class="form-group">
        <label for="roomIdInput">Oda Adı</label>
        <input type="text" id="roomIdInput" placeholder="İstediğiniz oda adını girin">
      </div>

      <div class="form-group">
        <label for="passwordInput">Oda Şifresi</label>
        <input type="password" id="passwordInput" placeholder="Belirlemek istediğiniz şifre">
      </div>

      <div class="btn-group">
        <button id="btnJoinRoom" class="btn-primary">Odaya Katıl / Kur</button>
      </div>

      <div class="status-indicator">
        <span class="status-dot" id="globalStatusDot"></span>
        <span id="globalStatusText">Bağlantı Yok</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
