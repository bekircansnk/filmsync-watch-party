<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>FilmSync İzleme Partisi</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(31, 40, 51, 0.35); /* Yarı saydam cam arka planı */
      --primary: #45f3ff;
      --secondary: #66fcf1;
      --text: #c5c6c7;
      --text-bright: #ffffff;
      --accent: #ff4757;
      --font: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: var(--font);
      background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%); /* Gradyan koyu uzay arka planı */
      color: var(--text);
      padding: 15px;
      overflow-x: hidden;
    }

    .container {
      background: var(--panel-bg);
      backdrop-filter: blur(25px); /* Derin cam buğusu */
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.08); /* İnce cam kenarlığı */
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-bright);
      text-align: center;
      margin-bottom: 5px;
      letter-spacing: 0.5px;
    }

    h1 span {
      color: var(--primary);
    }

    .subtitle {
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 20px;
      color: #888;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: var(--secondary);
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.03); /* Cam input */
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: var(--text-bright);
      font-size: 0.85rem;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--primary);
      box-shadow: 0 0 12px rgba(69, 243, 255, 0.3);
    }

    /* Switch Tasarımları */
    .switch-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 6px 0;
    }
    .switch-label {
      font-size: 0.8rem;
      color: var(--text-bright);
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.15);
      transition: .3s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }

    button {
      width: 100%;
      padding: 11px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(69, 243, 255, 0.2), rgba(102, 252, 241, 0.2));
      color: var(--primary);
      border: 1px solid rgba(69, 243, 255, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-1.5px);
      background: linear-gradient(135deg, rgba(69, 243, 255, 0.3), rgba(102, 252, 241, 0.3));
      box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
    }

    .btn-action {
      background: linear-gradient(135deg, rgba(46, 213, 115, 0.2), rgba(123, 237, 159, 0.2));
      color: #2ed573;
      border: 1px solid rgba(46, 213, 115, 0.4);
      margin-top: 10px;
    }

    .btn-action:hover {
      transform: translateY(-1.5px);
      background: linear-gradient(135deg, rgba(46, 213, 115, 0.3), rgba(123, 237, 159, 0.3));
      box-shadow: 0 0 15px rgba(46, 213, 115, 0.4);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      color: var(--text-bright);
      border: 1px solid rgba(255, 255, 255, 0.08);
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-1.5px);
      box-shadow: 0 5px 12px rgba(255, 255, 255, 0.1);
    }

    .btn-danger {
      background: rgba(255, 71, 87, 0.15);
      color: #ff4757;
      border: 1px solid rgba(255, 71, 87, 0.3);
      margin-top: 10px;
    }

    .btn-danger:hover {
      transform: translateY(-1.5px);
      background: rgba(255, 71, 87, 0.25);
      box-shadow: 0 0 15px rgba(255, 71, 87, 0.4);
    }

    .active-room-card {
      background: rgba(69, 243, 255, 0.05);
      border: 1px dashed var(--primary);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: center;
    }

    .room-id-display {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f1c40f; /* Altın sarısı */
      margin: 12px 0;
      letter-spacing: 3px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 8px 15px;
      display: inline-block;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.02);
      transition: all 0.2s ease;
    }
    .room-id-display:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }
    .room-id-display:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 4px;
    }

    .copied-toast {
      font-size: 0.7rem;
      color: var(--secondary);
      margin-top: 4px;
      display: none;
    }

    /* Ayarlar Paneli */
    .settings-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
    }
    .settings-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .user-list-container {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
    }
    .user-list-title {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--secondary);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .user-list-items {
      font-size: 0.8rem;
      color: var(--text);
      max-height: 80px;
      overflow-y: auto;
      padding-left: 5px;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }
    .user-online-dot {
      width: 6px;
      height: 6px;
      background-color: #2ed573;
      border-radius: 50%;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--accent);
    }

    .status-dot.active {
      background-color: #2ed573;
      box-shadow: 0 0 8px #2ed573;
    }

    .hidden {
      display: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  
  <script src="libs/firebase-app.js"></script>
  <script src="libs/firebase-database.js"></script>
</head>
<body>
  <div class="container">
    <img src="icon.png" style="width: 64px; height: 64px; border-radius: 16px; display: block; margin: 0 auto 12px auto; box-shadow: 0 0 20px rgba(69, 243, 255, 0.4); border: 2px solid rgba(255, 255, 255, 0.15);" alt="Erva ile Film Partisi Logo">
    <h1>Erva ile Film <span>Partisi</span> 🍿</h1>
    <div class="subtitle">Erva ❤️ Bekir | Biz Bize Film Keyfi</div>

    <!-- Aktif Bağlantı Detayı -->
    <div id="activeRoomContainer" class="active-room-card hidden">
      <div class="status-indicator" style="margin-top: 0; margin-bottom: 12px; font-weight: 600; color: #2ed573;">
        <span class="status-dot active"></span>
        <span>Bağlandı & Senkronize</span>
      </div>
      <div>Şu an bağlı olduğunuz oda:</div>
      <div id="roomIdDisplay" class="room-id-display" title="Kopyalamak için tıklayın" role="button" tabindex="0" aria-label="Oda adını kopyala">-----</div>
      <div class="copied-toast" id="copiedToast">Oda adı kopyalandı!</div>
      
      <button id="btnGoToMovie" class="btn-action hidden">Film Sayfasına Git 🎬</button>


      <!-- Aktif Kullanıcı Listesi -->
      <div class="user-list-container">
        <div class="user-list-title" id="userCountTitle">Aktif Üyeler (0)</div>
        <div class="user-list-items" id="activeUsersList"></div>
      </div>

      <button id="btnRetrySync" class="btn-primary" style="margin-top: 12px;">Senkronizasyonu Yenile</button>
      <button id="btnCopyInvite" class="btn-secondary">Davet Linkini Kopyala</button>
      <button id="btnLeaveRoom" class="btn-danger">Odan Ayrıl</button>
    </div>

    <!-- Bağlantı Formu -->
    <div id="joinFormContainer">
      <div class="form-group">
        <label for="usernameInput">Adınız</label>
        <input type="text" id="usernameInput" placeholder="Kullanıcı adınızı girin">
      </div>

      <div class="form-group">
        <label for="roomIdInput">Oda Adı</label>
        <input type="text" id="roomIdInput" placeholder="İstediğiniz oda adını girin">
      </div>

      <div class="form-group">
        <label for="passwordInput">Oda Şifresi</label>
        <input type="password" id="passwordInput" placeholder="Belirlemek istediğiniz şifre">
      </div>

      <div class="btn-group">
        <button id="btnJoinRoom" class="btn-primary">Odaya Katıl / Kur</button>
      </div>

      <div class="status-indicator">
        <span class="status-dot" id="globalStatusDot"></span>
        <span id="globalStatusText">Bağlantı Yok</span>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
