<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FilmSync Mobile</title>
    <style>
      :root {
        --bg-color: #0b0c10;
        --panel-bg: rgba(31, 40, 51, 0.65);
        --primary: #45f3ff;
        --secondary: #66fcf1;
        --text: #c5c6c7;
        --text-bright: #ffffff;
        --accent: #ff4757;
        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        font-family: var(--font);
        background-color: var(--bg-color);
        color: var(--text);
        overflow: hidden;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .form-container {
        width: 100%;
        max-width: 400px;
        background: var(--panel-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        transition: all 0.5s ease;
      }

      h1 {
        font-size: 1.8rem;
        color: var(--text-bright);
        text-align: center;
        margin-bottom: 5px;
      }

      h1 span {
        color: var(--primary);
      }

      .subtitle {
        font-size: 0.9rem;
        color: #888;
        text-align: center;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
        color: var(--secondary);
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: var(--text-bright);
        font-size: 0.95rem;
        transition: all 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 10px rgba(69, 243, 255, 0.2);
      }

      button {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: #0b0c10;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 252, 241, 0.4);
      }

      /* Video Oynatıcı Tam Ekran Kapsayıcı */
      #playerContainer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: black;
        display: none;
        z-index: 1000;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .back-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        width: auto;
        padding: 8px 15px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--text-bright);
        font-size: 0.8rem;
        z-index: 1001;
        border-radius: 6px;
      }

      .back-btn:hover {
        background: rgba(255, 71, 87, 0.8);
        box-shadow: none;
        transform: none;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="form-container" id="loginForm">
        <h1>FilmSync <span>Mobile</span> 📱</h1>
        <div class="subtitle">Arkadaşlarınla Birlikte Mobil Cihazda İzle</div>

        <div class="form-group">
          <label for="username">Adınız</label>
          <input type="text" id="username" placeholder="Adınızı girin" value="Mobil Kullanıcı" />
        </div>

        <div class="form-group">
          <label for="roomCode">Oda Kodu</label>
          <input type="text" id="roomCode" placeholder="Oda kodunu girin" />
        </div>

        <div class="form-group">
          <label for="filmUrl">Film/Dizi Sayfa URL'i</label>
          <input type="url" id="filmUrl" placeholder="https://www.hdfilmcehennemi.nl/..." />
        </div>

        <div class="form-group">
          <label for="serverUrl">Sunucu Adresi</label>
          <input type="text" id="serverUrl" value="ws://localhost:4000" />
        </div>

        <button id="btnConnect">Bağlan ve İzle</button>
      </div>
    </div>

    <!-- Tam ekran oynatıcı alanı -->
    <div id="playerContainer">
      <button class="back-btn" id="btnBack">⬅ Çıkış</button>
      <iframe id="videoIframe" allowfullscreen></iframe>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
